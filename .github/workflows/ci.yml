name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FPC_VERSION: "3.2.2"
  LAZARUS_VERSION: "4.0"

jobs:
  docs:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build MkDocs site in strict mode
        run: python -m mkdocs build --strict

  snippets-windows:
    name: Compile Pascal snippets (Windows)
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Lazarus and FPC
        shell: powershell
        run: choco install lazarus --version="$env:LAZARUS_VERSION" -y --no-progress

      - name: Locate FPC
        shell: powershell
        run: |
          $candidates = @(
            "C:\lazarus\fpc\$env:FPC_VERSION\bin\x86_64-win64\fpc.exe",
            "C:\Lazarus\fpc\$env:FPC_VERSION\bin\x86_64-win64\fpc.exe",
            "C:\tools\lazarus\fpc\$env:FPC_VERSION\bin\x86_64-win64\fpc.exe"
          )

          $fpc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $fpc) {
            $fpc = (Get-Command fpc -ErrorAction Stop).Source
          }

          "FPC_BIN=$fpc" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Compile snippets
        shell: powershell
        run: .\compile-all-snippets.ps1 -FpcBin "$env:FPC_BIN" -LazarusPath "C:\lazarus"

      - name: Upload snippet reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snippet-reports-windows
          path: |
            build/REPORT.txt
            build/snippet_results.csv

  snippets-linux:
    name: Compile Pascal snippets (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Lazarus sources and FPC
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y fpc lazarus-src

      - name: Verify FPC version
        shell: pwsh
        run: |
          $fpc = (Get-Command fpc -ErrorAction Stop).Source
          $installedVersion = & $fpc -iV
          if ($installedVersion -ne $env:FPC_VERSION) {
            throw "Expected FPC $env:FPC_VERSION, found $installedVersion"
          }

          "FPC_BIN=$fpc" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Compile snippets
        shell: pwsh
        run: ./compile-all-snippets.ps1 -FpcBin "$env:FPC_BIN"

      - name: Upload snippet reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snippet-reports-linux
          path: |
            build/REPORT.txt
            build/snippet_results.csv
